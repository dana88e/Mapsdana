document.getElementById('total').textContent=POINTS.length;
const map=L.map('map').setView([36.0579189,44.0526818],10);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'&copy; OpenStreetMap'}).addTo(map);
const layer=L.layerGroup().addTo(map);
let markers=[];
const folders=[...new Set(POINTS.map(p=>p.folder))].sort();
const folderSel=document.getElementById('folder');
folderSel.innerHTML='<option value="">كل المجلدات</option>'+folders.map(f=>`<option value="${escapeHtml(f)}">${escapeHtml(f)}</option>`).join('');
document.getElementById('search').addEventListener('input',render);
folderSel.addEventListener('change',render);
function escapeHtml(s){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));}
function filtered(){const q=document.getElementById('search').value.trim().toLowerCase();const f=folderSel.value;return POINTS.filter(p=>(!q||p.name.toLowerCase().includes(q)||p.folder.toLowerCase().includes(q))&&(!f||p.folder===f));}
function render(){
 const pts=filtered(); document.getElementById('shown').textContent=pts.length; layer.clearLayers(); markers=[];
 const list=document.getElementById('list'); list.innerHTML='';
 pts.forEach((p,i)=>{
   const m=L.marker([p.lat,p.lon]).bindPopup(`<b>${escapeHtml(p.name)}</b><br>${p.lat}, ${p.lon}<br><small>${escapeHtml(p.folder)}</small><br><a target="_blank" href="https://www.google.com/maps?q=${p.lat},${p.lon}">فتح Google Maps</a>`);
   m.addTo(layer); markers.push(m);
   if(i<250){
    const div=document.createElement('div'); div.className='item';
    div.innerHTML=`<div class="name">${escapeHtml(p.name)}</div><div class="meta">${p.lat}, ${p.lon}</div><span class="badge">${escapeHtml(p.folder)}</span>`;
    div.onclick=()=>{map.setView([p.lat,p.lon],17);m.openPopup();}; list.appendChild(div);
   }
 });
 if(pts.length>250){const more=document.createElement('div');more.className='sub';more.textContent='القائمة تعرض أول 250 نتيجة فقط، استخدم البحث للتحديد.';list.appendChild(more);}
}
function fitAll(){const pts=filtered(); if(!pts.length)return; const bounds=L.latLngBounds(pts.map(p=>[p.lat,p.lon])); map.fitBounds(bounds.pad(0.08));}
function downloadCSV(){const rows=[['name','lat','lon','folder'],...filtered().map(p=>[p.name,p.lat,p.lon,p.folder])]; const csv=rows.map(r=>r.map(v=>'"'+String(v).replaceAll('"','""')+'"').join(',')).join('
'); const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'})); a.download='offline_maps_points.csv'; a.click();}
render(); fitAll();
</script>
